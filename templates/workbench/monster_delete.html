<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>删除怪物</title>
    <style>
        body { font-size: 16px; margin: 0; line-height: 1.8; }
        a:link { color: #136ec2; text-decoration: none; }
        .container { margin: 10px; }
        h3 { margin: 10px 0 5px 0; }
        .label { color: #666; }
        .value { font-weight: bold; }
        .danger { color: #c62828; font-weight: bold; }
        .btn { display: inline-block; padding: 6px 16px; margin: 4px; border: 1px solid #136ec2; border-radius: 3px; color: #fff; background: #136ec2; text-decoration: none; font-size: 16px; cursor: pointer; }
        .btn-danger { background: #c62828; border-color: #c62828; }
    </style>
</head>
<body>
<div class="container">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div style="color:#c62828;padding:4px 8px;margin:4px 0;border:1px solid #c62828;border-radius:3px;background:#ffebee">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <h3>删除怪物</h3>
    <a href="{{ url_for('workbench.monster_view', monster_id=monster_id) }}">返回详情</a><br/><br/>

    <div class="danger">⚠ 确认删除以下怪物？此操作不可撤销！</div><br/>

    怪物ID: <span class="value">{{ monster_id }}</span><br/>
    名称: <span class="value">{{ monster.name }}</span><br/>
    等级: <span class="value">{{ monster.level }}</span><br/>
    来源文件: <span class="value">{{ source_file }}</span><br/>

    <br/>
    <form method="post">
        <button type="submit" name="confirm" value="yes" class="btn btn-danger">确认删除</button>
        <button type="submit" name="confirm" value="no" class="btn">取消</button>
    </form>
</div>
</body>
</html>
