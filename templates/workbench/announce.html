<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发送系统公告</title>
    <style>
        body { font-size: 16px; margin: 0; line-height: 1.8; }
        a:link { color: #136ec2; text-decoration: none; }
        .container { margin: 10px; }
        h3 { margin: 10px 0 5px 0; }
        textarea { width: 100%; height: 80px; font-size: 14px; }
        .flash { color: green; }
    </style>
</head>
<body>
<div class="container">
    <a href="{{ url_for('workbench.index') }}">返回工作台</a><br/>

    {% with messages = get_flashed_messages() %}
    {% if messages %}<span class="flash">{{ messages[0] }}</span><br/>{% endif %}
    {% endwith %}

    <h3>发送系统公告</h3>

    <form method="post">
        公告内容:<br/>
        <textarea name="content" placeholder="输入公告内容..."></textarea><br/>
        <button type="submit">发送</button>
    </form>
</div>
</body>
</html>
