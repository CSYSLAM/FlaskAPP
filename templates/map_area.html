<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>区域地图</title>
<style>
body { font-size: 16px; }
a:link { color: #136ec2; text-decoration: none; }
details { border: 1px solid #ccc; margin: 4px 0; padding: 2px 6px; }
summary { cursor: pointer; font-weight: bold; }
summary .cur { color: #00FFFF; }
.scene-list { font-size: 13px; line-height: 1.8; }
.scene-list a.cur { color: #00FFFF; font-weight: bold; }
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin-left:10px;margin-right:10px">

<div id="loading"><span></span></div>

<a href="{{ url_for('map.index') }}">返回地图</a><br/>
<h3>区域地图</h3>
点击区域展开，选择场景进入（非VIP进入消耗1个孔明灯）。<br/>
<br/>

{% for area in areas %}
<details {% if area.is_current %}open{% endif %}>
  <summary>{{ area.area_name }}（{{ area.scenes|length }}个场景）{% if area.is_current %} <span class="cur">· 当前所在</span>{% endif %}</summary>
  <div class="scene-list">
  {% for s in area.scenes %}
    <a href="{{ url_for('map.goto_scene', scene_id=s.id) }}"{% if s.id == location_id %} class="cur"{% endif %}>{{ s.name }}</a>{% if not loop.last %}、{% endif %}
  {% endfor %}
  </div>
</details>
{% endfor %}

<br/>
<a href="{{ url_for('map.index') }}">返回上级</a><br/>
<a href="{{ url_for('game.scene') }}">返回游戏</a><br/>

<script>
var aLinks = document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){ if(aLinks[i].href.indexOf('javascript:')===0)continue; aLinks[i].onclick=function(){
    document.getElementById('loading').style.display='block';
}; }
setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 350);
</script>
</body>
</html>
