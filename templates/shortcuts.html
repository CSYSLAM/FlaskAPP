<!DOCTYPE html>
<html>
<head>
    <title>快捷键设置</title>
    <style>
        body { font-size: 16px;  margin: 0; line-height: 1.6; }
        a { text-decoration: none; color: #136ec2; }
        
    
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style='margin-left:10px;margin-right:10px'>
    <div id="loading"><span></span></div>
    <h1>快捷键设置</h1>
    <form action="{{ url_for('battle.set_shortcut') }}" method="post">
        <h2>技能快捷键</h2>
        {% for i in range(1, 5) %}
        <div>
            <label>技能{{ i }}:</label>
            <select name="skill{{ i }}">
                <option value="attack">普通攻击</option>
                {% for skill_id in player.learned_skills %}
                    {% set skill_data = DataService.get_skill(skill_id) %}
                    {% if skill_data and skill_data.get('skill_type') == 'active' %}
                        <option value="{{ skill_id }}" {% if skill_id == player.shortcuts['skill' ~ i] %}selected{% endif %}>
                            {{ skill_data.name }}
                        </option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        {% endfor %}

        <h2>药品快捷键</h2>
        {% for i in range(1, 3) %}
        <div>
            <label>药品{{ i }}:</label>
            <select name="potion{{ i }}">
                <option value="">不设置</option>
                {% for inv in DataService.get_inventory(player.id) %}
                    {% set item_data = DataService.get_item(inv.item_id) %}
                    {% if item_data and item_data.get('item_type') == 'potion' %}
                        <option value="{{ inv.item_id }}" {% if inv.item_id == player.shortcuts['potion' ~ i] %}selected{% endif %}>
                            {{ item_data.name }}({{ inv.quantity }})
                        </option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        {% endfor %}


        <button type="submit">保存设置</button>
    </form>
    <a href="{{ url_for('battle.battle') }}">返回战斗</a>

<script>
var aLinks=document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){aLinks[i].onclick=function(){document.getElementById('loading').style.display='block';};}
setTimeout(function(){document.getElementById('loading').style.display='none';},350);
</script>
</body>
</html>
