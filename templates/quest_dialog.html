<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>{{ quest.name }}</title><style>body{font-size:16px}a:link{color:#136ec2;text-decoration:none}#loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:9999}#loading span{display:block;width:40px;height:40px;margin:40vh auto;border:4px solid #fff;border-top-color:#136ec2;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body style='margin-left:10px;margin-right:10px'><div id="loading"><span></span></div>
『{{ '接受任务' if phase == 'accept' else '完成任务' }}-{{ quest.name }}』<br/>
{% for d in dialogs %}
{{ d.speaker }}: {{ d.text }}<br/>
{% endfor %}
<a href="{{ url_for('quest.quest_detail', quest_id=quest.id) }}">继续</a><br/>
<a href="{{ url_for('game.scene') }}">返回游戏<br/></a>
<script>var a=document.getElementsByTagName("a");for(var i=0;i<a.length;i++){a[i].onclick=function(){document.getElementById('loading').style.display='block'}}setTimeout(function(){document.getElementById('loading').style.display='none'},350)</script></body></html>
