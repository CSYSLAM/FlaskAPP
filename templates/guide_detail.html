<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ guide.title }}攻略</title>
<style>
body { font-size: 16px; }
a:link { color: #136ec2; text-decoration: none; }

.tooltip {
    position: relative;
    display: inline-block;
    color: #136ec2;
}

.tooltip .tooltiptext {
    visibility: hidden;
    width: 200px;
    background-color: black;
    color: #fff;
    text-align: center;
    border-radius: 6px;
    padding: 5px 0;
    position: absolute;
    z-index: 1;
    top: 150%;
    left: 50%;
    margin-left: -100px;
}

.tooltip .tooltiptext::after {
    content: "";
    position: absolute;
    bottom: 100%;
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: transparent transparent black transparent;
}

.tooltip:hover .tooltiptext {
    visibility: visible;
}

#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin-left:10px;margin-right:10px">

<div id="loading"><span></span></div>

{{ guide.title }}攻略》 <a href="{{ url_for('guide.index') }}">返回</a><br/>
{% for line in guide.content %}
{% if line %}
{{ line|safe }}<br/>
{% else %}
<br/>
{% endif %}
{% endfor %}
{% if guide.detail %}
<hr/>
{% for para in guide.detail.split('\n\n') %}
{% if para %}{{ para|safe }}<br/>{% else %}<br/>{% endif %}
{% endfor %}
{% endif %}
<br/>
<a href="{{ url_for('guide.index') }}">返回</a><br/>
<a href="{{ url_for('game.scene') }}">返回游戏</a><br/>

<script>
var aLinks = document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){ if(aLinks[i].href.indexOf('javascript:')===0)continue; aLinks[i].onclick=function(){
    document.getElementById('loading').style.display='block';
}; }
setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 350);
</script>
</body>
</html>
