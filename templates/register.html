<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>梦回三国-注册</title>
<style>
body { font-size: 16px; }
a:link { color: #136ec2; text-decoration: none; }
input[type="text"], input[type="password"] {
    width: 200px;
    font-size: 16px;
    padding: 5px;
    margin: 5px 0;
}
input[type="submit"] {
    font-size: 16px;
    padding: 5px 20px;
    margin-top: 5px;
}
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin-left:10px;margin-right:10px">

<div id="loading"><span></span></div>

<b>注册新账号</b><br/>
<br/>

{% if message %}
<font color="red">{{ message }}</font><br/>
{% endif %}

<form method="POST" action="{{ url_for('auth.register') }}">
设置账号(3-20字)：<br/>
<input type="text" name="username" value="" title="账号" maxlength="20"><br/>
设置密码(3-20字)：<br/>
<input type="password" name="password" placeholder="密码设置尽量别带符号" value="" title="密码" maxlength="20"><br/>
重复密码(3-20字)：<br/>
<input type="password" name="password2" value="" title="重复一次密码" maxlength="20"><br/>
若注册失败，请用手机自带浏览器注册！<br/>
<input type="submit" value="注册">
</form>
<br/>
已有账号？<a href="{{ url_for('auth.login_page') }}">返回登陆</a><br/>
联系客服：QQ766671881<br/>

<script>
var aLinks = document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){ if(aLinks[i].href.indexOf('javascript:')===0)continue; aLinks[i].onclick=function(){
    document.getElementById('loading').style.display='block';
}; }
setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 350);
</script>
</body>
</html>
