<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私聊 - {{ target.nickname }}</title>
    <style>
    body { font-size: 16px; margin: 0; line-height: 1.6; }
    a:link { color: #136ec2; text-decoration: none; }
    #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
    #loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg-other { color: #666; }
    .msg-self { color: #136ec2; text-align: right; }
    </style>
</head>
<body style='margin-left:10px;margin-right:10px'>
    <div id="loading"><span></span></div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    {{ msg }}<br/>
    {% endfor %}
    <br/>
    {% endif %}
    {% endwith %}

    <a href="{{ url_for('player.view_player', username=target.username) }}">{{ target.nickname }}</a><br/>
    ----------------<br/>

    {% for msg in messages %}
    <div class="{% if msg.sender_id == player.id %}msg-self{% else %}msg-other{% endif %}">
    {{ msg.content }}
    </div>
    {% endfor %}
    <br/>

    <form action="{{ url_for('social.send_private_message', username=target.username) }}" method="post">
        <input type="text" name="content" style="width:70%;">
        <input type="submit" value="发送">
    </form>
    <br/>

    <a href="{{ url_for('social.gift_page', username=target.username) }}">赠送物品</a><br/>
    <a href="{{ url_for('social.chat') }}">返回聊天</a><br/>
    <a href="{{ url_for('game.scene') }}">返回游戏</a><br/>

<script>
var aLinks=document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){aLinks[i].onclick=function(){document.getElementById('loading').style.display='block';};}
setTimeout(function(){document.getElementById('loading').style.display='none';},350);
</script>
</body>
</html>
