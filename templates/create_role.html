<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>梦回三国-创建角色</title>
<style>
body { font-size: 16px; }
a:link { color: #136ec2; text-decoration: none; }
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin-left:10px;margin-right:10px">

<div id="loading"><span></span></div>

请创建您的角色<br/>
<br/>

{% if message %}
<font color="red">{{ message }}</font><br/>
{% endif %}

<form method="POST" action="{{ url_for('auth.create_role') }}">

昵称：<br/>
<input type="text" name="nickname" placeholder="请输入角色昵称" maxlength="20" style="font-size:16px;padding:3px;"><br/><br/>

国家：<br/>
<select name="country" style="font-size:16px;padding:3px;">
    <option value="魏">魏国</option>
    <option value="蜀">蜀国</option>
    <option value="吴">吴国</option>
</select><br/><br/>

职业：<br/>
<select name="player_class" style="font-size:16px;padding:3px;">
    <option value="战士">战士</option>
    <option value="术士">术士</option>
    <option value="刺客">刺客</option>
</select><br/><br/>

性别：<br/>
<select name="gender" style="font-size:16px;padding:3px;">
    <option value="男">男</option>
    <option value="女">女</option>
</select><br/><br/>

<input type="submit" value="创建角色" style="font-size:16px;padding:5px 10px;">
</form>

<br/>
<a href="{{ url_for('auth.logout') }}">返回登录</a><br/>

<script>
var aLinks = document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){ if(aLinks[i].href.indexOf('javascript:')===0)continue; aLinks[i].onclick=function(){
    document.getElementById('loading').style.display='block';
}; }
setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 350);
</script>
</body>
</html>
