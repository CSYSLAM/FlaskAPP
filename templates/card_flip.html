<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金珠幸运翻牌</title>
    <style>
    body { font-size: 16px; margin: 0; line-height: 1.6; }
    a:link { color: #136ec2; text-decoration: none; }
    #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
    #loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body style='margin-left:10px;margin-right:10px'>
    <div id="loading"><span></span></div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    {{ msg }}<br/>
    {% endfor %}
    <br/>
    {% endif %}
    {% endwith %}

    幸运金珠翻牌<br/>
    ----------------<br/>
    金珠:{{ player.jinzu }} 元宝:{{ player.yuanbao }}<br/>
    <a href="{{ url_for('activity.do_card_flip', currency='jinzu') }}">翻牌(50金珠)</a><br/>
    <a href="{{ url_for('activity.do_card_flip', currency='yuanbao') }}">翻牌(1元宝)</a><br/>
    ----------------<br/>
    翻牌奖池<br/>
    续命灯/止血草x5/凝魔草x5/强化宝玉/银两/经验/金珠<br/>
    <br/>
    <a href="{{ url_for('activity.index') }}">返回活动<br/></a>
    <a href="{{ url_for('game.scene') }}">返回游戏<br/></a>

    <script>
    var aLinks=document.getElementsByTagName("a");
    for(var i=0;i<aLinks.length;i++){aLinks[i].onclick=function(){document.getElementById('loading').style.display='block';};}
    setTimeout(function(){document.getElementById('loading').style.display='none';},350);
    </script>
</body>
</html>
