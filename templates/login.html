<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>梦回三国2-登录</title>
<style>
body { font-size: 16px; }
a:link { color: #136ec2; text-decoration: none; }
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin-left:10px;margin-right:10px">

<div id="loading"><span></span></div>

<img src="{{ url_for('static', filename='images/login_logo.png') }}" height="50" width="180"><br/>
<b>梦回三国2</b><br/>
<br/>

{% if register_msg %}
<font color="red">{{ register_msg|safe }}</font><br/>
<br/>
{% endif %}

{% if message %}
<font color="red">{{ message }}</font><br/>
{% endif %}

<form method="POST" action="{{ url_for('auth.login_page') }}">
账号：<br/><input type="text" name="username" value="" title="帐号" maxlength="32"><br/><br/>
密码：<br/><input type="password" name="password" value="" title="密码" maxlength="32"><br/><br/>
<input type="submit" value="马上登录" style="font-size:16px;padding:5px 10px;">
</form>
<br/>
还没有账号？<a href="{{ url_for('auth.register') }}">账号注册</a><br/>
联系客服：QQ766671881<br/>

<script>
var aLinks = document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){ if(aLinks[i].href.indexOf('javascript:')===0)continue; aLinks[i].onclick=function(){
    document.getElementById('loading').style.display='block';
}; }
setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 350);
</script>
</body>
</html>
