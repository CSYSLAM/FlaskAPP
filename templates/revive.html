<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>复活</title>
    <style>
        body {
            margin: 0;
            line-height: 1.6;
        }
        h1, h2, h3, p, ul {
            margin: 0;
            padding: 0;
            font-size: 16px;
            text-align: left;
        }
        a {
            text-decoration: none;
            color: #136ec2;
            margin-right: 10px;
        }
        
        .section {
            margin: 10px 0;
            padding: 10px 0;
            }
        .error-message {
            color: red;
            margin: 10px 0;
        }
    
#loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; }
#loading span { display: block; width: 40px; height: 40px; margin: 40vh auto; border: 4px solid #fff; border-top-color: #136ec2; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style='margin-left:10px;margin-right:10px'>
    <div id="loading"><span></span></div>
    <div class="section">
        <h2>你已经死亡，选择复活方式：</h2>
        <p>{{ player.last_battle_result }}</p>
    </div>
    
    {% if revive_message %}
        <p class="error-message">{{ revive_message }}</p>
    {% endif %}

    <div class="section">
        {% if has_revive_item %}
        <a href="{{ url_for('battle.revive_action', method='item') }}">满血复活(续命灯X1)</a>
        {% else %}
        <span style="color:gray;">满血复活(续命灯X1) - 无续命灯</span>
        {% endif %}
        <a href="{{ url_for('battle.revive_action', method='weak') }}">虚弱复活(10%血量)</a>
    </div>

<script>
var aLinks=document.getElementsByTagName("a");
for(var i=0;i<aLinks.length;i++){aLinks[i].onclick=function(){document.getElementById('loading').style.display='block';};}
setTimeout(function(){document.getElementById('loading').style.display='none';},350);
</script>
</body>
</html>
